name: insect_crop_camera
description: AgriSmart — farmer tools, live pest & disease checks, local shop catalogue with admin CRUD (SQLite).
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.11.0+2
  tflite_flutter: ^0.11.0
  image: ^4.2.0
  vibration: ^2.0.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  url_launcher: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.2
  http: ^1.2.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#E8F5E9"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/labels.txt
    # Optional: add assets/insect_model.tflite (>= ~4KB valid TFLite) and list it here.
    - assets/README_CROP_DISEASE_MODEL.txt
    - assets/README_INSECT_MODEL.txt
